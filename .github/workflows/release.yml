name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            output: kiro-reg-linux-amd64
          - os: ubuntu-latest
            platform: linux/arm64
            output: kiro-reg-linux-arm64
          - os: windows-latest
            platform: windows/amd64
            output: kiro-reg-windows-amd64.exe
          - os: windows-latest
            platform: windows/arm64
            output: kiro-reg-windows-arm64.exe
          - os: macos-latest
            platform: darwin/arm64
            output: kiro-reg-macos-arm64
          - os: macos-latest
            platform: darwin/amd64
            output: kiro-reg-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Copy app icon
        run: cp frontend/assets/appicon.png build/appicon.png

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -o ${{ matrix.output }}

      - name: Replace macOS icon with iconutil
        if: runner.os == 'macOS'
        run: |
          APP=$(find build/bin -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP" ]; then
            ICONSET=$(mktemp -d)/appicon.iconset
            mkdir -p "$ICONSET"
            SRC="frontend/assets/appicon.png"
            sips -z 16 16 "$SRC" --out "$ICONSET/icon_16x16.png"
            sips -z 32 32 "$SRC" --out "$ICONSET/icon_16x16@2x.png"
            sips -z 32 32 "$SRC" --out "$ICONSET/icon_32x32.png"
            sips -z 64 64 "$SRC" --out "$ICONSET/icon_32x32@2x.png"
            sips -z 128 128 "$SRC" --out "$ICONSET/icon_128x128.png"
            sips -z 256 256 "$SRC" --out "$ICONSET/icon_128x128@2x.png"
            sips -z 256 256 "$SRC" --out "$ICONSET/icon_256x256.png"
            sips -z 512 512 "$SRC" --out "$ICONSET/icon_256x256@2x.png"
            sips -z 512 512 "$SRC" --out "$ICONSET/icon_512x512.png"
            sips -z 1024 1024 "$SRC" --out "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/iconfile.icns"
            rm -rf "$(dirname "$ICONSET")"
          fi

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r ${{ matrix.output }}.zip *.app

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: |
          cd build/bin
          tar czf ${{ matrix.output }}.tar.gz ${{ matrix.output }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        run: |
          cd build/bin
          Compress-Archive -Path "${{ matrix.output }}" -DestinationPath "${{ matrix.output }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: |
            build/bin/*.zip
            build/bin/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract changelog
        id: changelog
        run: |
          # Extract content between first ## and second ##
          changelog=$(sed -n '/^## \[/,/^## \[/{/^## \[.*\]/!p}' CHANGELOG.md | sed '/^---$/d' | sed '/^$/d')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/**/*
